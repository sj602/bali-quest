<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌺 Bali Quest - 발리 마리오</title>
<style>

  :root {
    --gold:#D4A017; --saffron:#E8891A; --rice:#F5E6C8;
    --shadow:#3D1C02; --lotus:#C84B8F;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--shadow);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Nunito',sans-serif; overflow:hidden; user-select:none;
  }
  #ui-bar {
    width:800px; max-width:100vw;
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 16px;
    background:linear-gradient(135deg,var(--shadow) 0%,#5C2D00 100%);
    border:2px solid var(--gold); border-bottom:none; border-radius:12px 12px 0 0;
  }
  .ui-block { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .ui-label { font-size:9px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; }
  .ui-val   { font-size:18px; font-weight:900; color:var(--rice); font-family:'Cinzel Decorative',cursive; }
  #stage-badge {
    background:linear-gradient(135deg,var(--lotus),#8B2060);
    border:2px solid var(--gold); border-radius:20px;
    padding:3px 14px; font-size:13px; font-weight:900;
    color:var(--rice); letter-spacing:1px;
  }
  #game-canvas { display:block; border:3px solid var(--gold); border-top:none; border-radius:0 0 8px 8px; image-rendering:pixelated; cursor:none; }
  #controls { margin-top:8px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .ctrl-key {
    background:linear-gradient(180deg,#5C3A1E 0%,var(--shadow) 100%);
    border:2px solid var(--gold); border-radius:6px; padding:3px 9px;
    color:var(--rice); font-size:11px; font-family:'Nunito',sans-serif; font-weight:700;
  }
  #overlay {
    position:fixed; inset:0; background:rgba(20,8,0,0.92);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:10; gap:12px;
  }
  #overlay h1 {
    font-family:'Cinzel Decorative',cursive; font-size:32px; color:var(--gold);
    text-shadow:0 0 24px var(--saffron),2px 2px 0 var(--shadow); text-align:center; line-height:1.3;
  }
  #overlay p { color:var(--rice); font-size:14px; text-align:center; max-width:380px; line-height:1.7; }
  .stage-cards { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
  .stage-card {
    background:linear-gradient(135deg,#5C2D00,#3D1C02);
    border:2px solid var(--gold); border-radius:12px; padding:14px 20px;
    text-align:center; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s;
    min-width:130px;
  }
  .stage-card:hover { transform:scale(1.07); box-shadow:0 6px 24px rgba(212,160,23,0.5); }
  .stage-card.locked { opacity:0.4; cursor:not-allowed; }
  .stage-card.locked:hover { transform:none; box-shadow:none; }
  .stage-num { font-family:'Cinzel Decorative',cursive; font-size:22px; color:var(--gold); }
  .stage-name { color:var(--rice); font-size:12px; font-weight:700; margin-top:4px; }
  .stage-diff { font-size:11px; margin-top:4px; }
  #start-btn {
    background:linear-gradient(135deg,var(--saffron),var(--gold));
    border:none; border-radius:40px; padding:12px 44px;
    font-family:'Cinzel Decorative',cursive; font-size:16px; color:var(--shadow);
    cursor:pointer; box-shadow:0 4px 20px rgba(232,137,26,0.5);
    transition:transform 0.1s,box-shadow 0.1s; margin-top:4px;
  }
  #start-btn:hover { transform:scale(1.05); box-shadow:0 6px 28px rgba(232,137,26,0.7); }
  #start-btn:active { transform:scale(0.97); }
  .mobile-btns {
    display:none; margin-top:10px; gap:14px; justify-content:center; align-items:center;
  }
  .mb {
    width:54px; height:54px; background:rgba(212,160,23,0.2);
    border:2px solid var(--gold); border-radius:50%; color:var(--rice); font-size:20px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .mb:active { background:rgba(212,160,23,0.5); }
  @media (max-width:820px) {
    #ui-bar { width:100vw; }
    #game-canvas { width:100vw; height:auto; }
    .mobile-btns { display:flex; }
    .ctrl-key { display:none; }
  }
</style>

const keys = {};

document.addEventListener('keydown', e => { if(GAME_KEYS.has(e.code)) e.preventDefault(); keys[e.code]=true; }, {passive:false});

function setupMobile() {

  mbr.addEventListener('touchstart', e=>{e.preventDefault();mobileState.right=true;},opt);
  mbr.addEventListener('touchend',   e=>{e.preventDefault();mobileState.right=false;},opt);

  mbr.addEventListener('mousedown',()=>mobileState.right=true);

setupMobile();
function isLeft()  { return !!(keys['ArrowLeft'] ||keys['KeyA']||mobileState.left); }
function isRight() { return !!(keys['ArrowRight']||keys['KeyD']||mobileState.right); }
function isJump()  { return !!(keys['ArrowUp']||keys['Space']||keys['KeyW']||mobileState.jumpPressed); }
function isDash()  { return !!(keys['KeyZ']||keys['ShiftLeft']||keys['ShiftRight']); }

// ════════════════════════════════════════
//  LEVEL BUILDER
// ════════════════════════════════════════
function buildLevel(def) {
  const LEVEL_W = def.goalX + 20;
  const ground = [];
  // Build ground with gaps
  const gapSet = new Set();
  for(const [s,e] of def.gaps) for(let i=s;i<=e;i++) gapSet.add(i);
  for(let i=0; i<LEVEL_W; i++) {
    if(!gapSet.has(i))
      ground.push({x:i*TILE, y:H-TILE*2, w:TILE, h:TILE*2, type:'ground'});
  }

  // Platforms from def
  const platforms = def.extraPlats.map(([tx,tyFromBot,tw])=>({
    x:tx*TILE, y:H-TILE*(tyFromBot+2)-TILE, w:tw*TILE, h:TILE, type:'plat'
  }));

  // Coins
  const coinList = def.coinRows.map(([tx,tyFromBot])=>({
    x:tx*TILE+8, y:H-TILE*(tyFromBot+2)-16,
    collected:false, anim:Math.random()*Math.PI*2
  }));

  // Enemies — y placed on ground or platform
  const enemies = def.enemies.map(e => ({
    x: e.tx*TILE,
    y: H-TILE*(e.ty+2)-30,
    vx: e.spd,
    alive: true,
    dir: 1,
    startX: e.patrol[0]*TILE,
    endX:   e.patrol[1]*TILE,
    spd: e.spd,
  }));

  const goal = { x: def.goalX*TILE, y: H-TILE*2-TILE*8, reached: false };

  // Decorations
  const decor = [];
  if(def.bgDecor === 'jungle' || def.bgDecor === 'volcano') {
    for(let i=0; i<25; i++) decor.push({type:'tree', x:(i*6+2)*TILE+Math.random()*TILE*2, y:H-TILE*2});
    for(let i=0; i<6; i++)  decor.push({type:'temple', x:(i*18+8)*TILE, y:H-TILE*2});
  } else if(def.bgDecor === 'beach') {
    for(let i=0; i<30; i++) decor.push({type:'palm', x:(i*5+2)*TILE+Math.random()*TILE, y:H-TILE*2});
    for(let i=0; i<8; i++)  decor.push({type:'rock', x:(i*14+6)*TILE, y:H-TILE*2});
  } else if(def.bgDecor === 'night') {
    for(let i=0; i<40; i++) decor.push({type:'star', x:Math.random()*LEVEL_W*TILE, y:Math.random()*(H*0.5)});
    for(let i=0; i<6; i++)  decor.push({type:'temple', x:(i*20+5)*TILE, y:H-TILE*2});
  } else if(def.bgDecor === 'temple_final') {
    for(let i=0; i<60; i++) decor.push({type:'star', x:Math.random()*LEVEL_W*TILE, y:Math.random()*(H*0.6)});
    for(let i=0; i<10; i++) decor.push({type:'temple', x:(i*12+4)*TILE, y:H-TILE*2});
    for(let i=0; i<8; i++)  decor.push({type:'lotus', x:(i*15+6)*TILE, y:H-TILE*2-20});
  }

  return { ground, platforms, tiles:[...ground,...platforms], coinList, enemies, goal, decor, def };
}

//  INIT / RESET

function initStage(stageIdx, keepScore) {
  currentStage = stageIdx;
  const def = STAGE_DEFS[stageIdx];
  level = buildLevel(def);
  player = {
    x:2*TILE, y:H-TILE*4, vx:0, vy:0, w:28, h:36,
    onGround:false, facing:1, invincible:0,
    jumpHeld:0, coyoteFrames:0, jumpBuffer:0,
    runAnim:0, dead:false, deathTimer:0,
  };
  jumpLock = false;
  particles = [];
  camX = 0;
  if(!keepScore) { score=0; lives=3; coins=0; }
  else coins=0;
  updateHUD();
  document.getElementById('stage-badge').textContent = `STAGE ${def.id}`;
}

function spawnParticle(x,y,color,count=6) {
  for(let i=0;i<count;i++) {
    const angle=(Math.PI*2/count)*i+Math.random()*0.5;
    particles.push({x,y,vx:Math.cos(angle)*3*(0.5+Math.random()),vy:Math.sin(angle)*3*(0.5+Math.random()),life:1,color,r:5+Math.random()*5});
  }
}

function updateHUD() {
  document.getElementById('score-el').textContent = score;
  document.getElementById('lives-el').textContent = '❤️'.repeat(Math.max(0,lives));
}

// ════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════
function tileCollide(rect, tiles) {
  const res={top:false,bottom:false,left:false,right:false};
  for(const t of tiles) {
    if(rect.x+rect.w<=t.x||rect.x>=t.x+t.w) continue;
    if(rect.y+rect.h<=t.y||rect.y>=t.y+t.h) continue;
    const ox=Math.min(rect.x+rect.w,t.x+t.w)-Math.max(rect.x,t.x);
    const oy=Math.min(rect.y+rect.h,t.y+t.h)-Math.max(rect.y,t.y);
    if(ox<oy) {
      if(rect.x+rect.w/2<t.x+t.w/2){rect.x-=ox;res.right=true;}
      else{rect.x+=ox;res.left=true;}
    } else {
      if(rect.y+rect.h/2<t.y+t.h/2){rect.y-=oy;res.bottom=true;}
      else{rect.y+=oy;res.top=true;}
    }
  }
  return res;
}
function rectsOverlap(p,ex,ey,ew,eh){return p.x<ex+ew&&p.x+p.w>ex&&p.y<ey+eh&&p.y+p.h>ey;}

// ════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════
function update() {
  if(state!=='play') return;
  const p=player;
  const def=STAGE_DEFS[currentStage];

  if(p.dead) {
    p.deathTimer--;
    p.vy+=GRAVITY; p.y+=p.vy;
    if(p.deathTimer<=0) {
      lives--;
      updateHUD();
      if(lives<=0){ state='gameover'; showGameOver(); return; }
      p.dead=false;
      p.x=2*TILE; p.y=H-TILE*4; p.vx=0; p.vy=0; p.invincible=120;
      p.jumpHeld=0; p.coyoteFrames=0; p.jumpBuffer=0;
      jumpLock=false;
      camX=0;
    }
    return;
  }

  const spd = isDash() ? 6 : 5;
  if(isLeft())  { p.vx=Math.max(p.vx-1,-spd); p.facing=-1; }
  if(isRight()) { p.vx=Math.min(p.vx+1, spd); p.facing= 1; }
  if(!isLeft()&&!isRight()) p.vx*=0.75;

  // ── 점프 입력을 프레임 시작에 딱 한 번만 스냅샷 ──
  // isJump()를 여러 번 호출하면 mobileState.jumpPressed가
  // 중간에 소비되어 간헐적으로 씹히는 문제를 방지한다.
  const jumpRaw = isJump();
  // 엣지 감지: 이전 프레임에 눌리지 않았다가 이번 프레임에 눌린 순간만 "새 점프 입력"으로 인정
  const jumpEdge = jumpRaw && !jumpLock;
  // 모바일 플래그는 스냅샷 직후 즉시 소비 (다음 isJump() 호출에 영향 없도록)
  mobileState.jumpPressed = false;
  // jumpLock 갱신: 버튼이 떼어지는 순간 해제 → 다음 엣지를 즉시 감지 가능
  jumpLock = jumpRaw;

  // 코요테 타임: 발판 끝에서 막 떨어진 직후 몇 프레임간 점프 허용
  if(p.onGround) p.coyoteFrames = 6;
  else if(p.coyoteFrames > 0) p.coyoteFrames--;

  // 점프 버퍼: 공중에서 점프 키를 미리 눌러도 착지 직후 자동 점프
  if(jumpEdge) p.jumpBuffer = 8;
  else if(p.jumpBuffer > 0) p.jumpBuffer--;

  // 실제 점프 실행: 버퍼가 남아 있고 코요테 타임 내에 있으면 점프
  if(p.jumpBuffer > 0 && p.coyoteFrames > 0) {
    p.vy = JUMP_F;
    p.jumpHeld = 14;
    p.jumpBuffer = 0;
    p.coyoteFrames = 0;
  }
  // 버튼 유지 → 상승력 추가 (높이 조절)
  if(jumpRaw && p.jumpHeld > 0) { p.vy -= 0.45; p.jumpHeld--; }
  else if(!jumpRaw) p.jumpHeld = 0;

  p.vy=Math.min(p.vy+GRAVITY,18);
  p.x+=p.vx; p.y+=p.vy;

  const rect={x:p.x,y:p.y,w:p.w,h:p.h};
  const col=tileCollide(rect,level.tiles);
  p.x=rect.x; p.y=rect.y;
  // onGround는 반드시 콜리전 처리 이후에 갱신해야
  // "이 프레임에 착지한 순간"도 정확히 잡힌다
  p.onGround=col.bottom;
  if(col.top&&p.vy<0) p.vy=1;
  if(col.bottom) p.vy=0;
  if(p.x<0) p.x=0;
  if(p.y>H+120){ killPlayer(); return; }
  if(p.onGround&&(isLeft()||isRight())) p.runAnim+=Math.abs(p.vx)*0.15;
  if(p.invincible>0) p.invincible--;

  // Coins
  for(const c of level.coinList) {
    if(c.collected) continue;
    c.anim+=0.08;
    if(rectsOverlap(p,c.x-8,c.y-8,28,28)) {
      c.collected=true; coins++;
      score+=def.coinBonus;
      spawnParticle(c.x,c.y,'#FFD700',8);
      updateHUD();
    }
  }

  // Enemies
  for(const e of level.enemies) {
    if(!e.alive) continue;
    e.x+=e.vx;
    if(e.x<e.startX||e.x>e.endX){ e.vx*=-1; e.dir*=-1; }
    if(rectsOverlap(p,e.x,e.y,30,30)) {
      if(p.vy>0&&p.y+p.h<e.y+20) {
        e.alive=false; score+=200; p.vy=-8;
        spawnParticle(e.x+15,e.y+15,'#8B4513',10); updateHUD();
      } else { hurtPlayer(); }
    }
  }

  // Goal
  if(!level.goal.reached&&rectsOverlap(p,level.goal.x,level.goal.y,24,TILE*8)) {
    level.goal.reached=true;
    score+=def.scoreBonus+coins*50; updateHUD();
    // Unlock next stage
    const nextIdx=currentStage+1;
    if(nextIdx<STAGE_DEFS.length && nextIdx+1>unlockedStages) {
      unlockedStages=nextIdx+1;
      try{localStorage.setItem('bq_unlocked',unlockedStages);}catch(e){}
    }
    state='stageclear';
    showStageClear(nextIdx);
    return;
  }

  const targetCamX=p.x-W/2+p.w/2;
  camX+=(targetCamX-camX)*0.12;
  camX=Math.max(0,camX);

  for(let i=particles.length-1;i>=0;i--) {
    const pt=particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.2; pt.life-=0.04;
    if(pt.life<=0) particles.splice(i,1);
  }
}

function hurtPlayer() {
  if(player.invincible>0||player.dead) return;
  player.invincible=90; player.vy=-6; lives--; updateHUD();
  if(lives<=0) killPlayer();
}
function killPlayer() {
  player.dead=true; player.deathTimer=90; player.vy=-12;
}

// ════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════
function drawBg() {
  const def=STAGE_DEFS[currentStage];
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,def.skyTop); grad.addColorStop(1,def.skyBot);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Stars for night/temple stages
  if(def.bgDecor==='night'||def.bgDecor==='temple_final') {
    const t2=Date.now()*0.001;
    for(const d of level.decor) {
      if(d.type!=='star') continue;
      const dx=((d.x-camX*0.05)%(W+200)+W+200)%(W+200)-100;
      const alpha=0.5+0.5*Math.sin(t2+d.x*0.01);
      ctx.fillStyle=`rgba(255,255,200,${alpha})`;
      ctx.beginPath(); ctx.arc(dx,d.y,1.5,0,Math.PI*2); ctx.fill();
    }
  }

  // Sun / moon
  ctx.save();
  ctx.shadowBlur=40; ctx.shadowColor=def.sunColor;
  ctx.fillStyle=def.sunColor;
  const sunX=(W-80-(camX*0.05)%W);
  ctx.beginPath(); ctx.arc(sunX,70,36,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Mountains parallax
  const mx=camX*0.2;
  ctx.fillStyle=def.mtnColor[0];
  for(let i=0;i<10;i++){const bx=i*160-(mx%160);drawTriangle(bx,H-TILE*2,100,180);drawTriangle(bx+80,H-TILE*2,70,130);}
  ctx.fillStyle=def.mtnColor[1];
  for(let i=0;i<10;i++){const bx=i*200-(mx*1.3%200);drawTriangle(bx-20,H-TILE*2,80,120);}

  // Clouds (not on night/temple stages)
  if(def.bgDecor!=='night'&&def.bgDecor!=='temple_final') {
    ctx.fillStyle='rgba(255,255,255,0.8)';
    const clouds=[[80,60],[220,40],[400,80],[600,50],[750,70],[950,55],[1150,65]];
    for(const [cx2,cy] of clouds) {
      const cx3=((cx2-camX*0.08)%(W+200)+W+200)%(W+200)-100;
      drawCloud(cx3,cy);
    }
  }
  // Purple nebula for stage 4/5
  if(def.bgDecor==='night'||def.bgDecor==='temple_final') {
    ctx.save();
    ctx.globalAlpha=0.12;
    ctx.fillStyle=def.sunColor;
    const nx=((-camX*0.04+200)%(W+300)+W+300)%(W+300)-150;
    ctx.beginPath(); ctx.arc(nx,100,120,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(nx+250,160,90,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawTriangle(x,y,w,h) {
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w/2,y-h); ctx.lineTo(x+w,y); ctx.closePath(); ctx.fill();
}
function drawCloud(x,y) {
  ctx.beginPath(); ctx.arc(x,y,25,0,Math.PI*2); ctx.arc(x+28,y-10,32,0,Math.PI*2); ctx.arc(x+60,y,22,0,Math.PI*2); ctx.fill();
}

function drawDecor(d) {
  const def=STAGE_DEFS[currentStage];
  const dx=d.x-camX;
  if(dx<-120||dx>W+120) return;
  if(d.type==='tree'||d.type==='palm') {
    // Trunk
    ctx.fillStyle='#6B3A1A';
    if(d.type==='palm') {
      // Bent palm
      ctx.fillRect(dx-4,d.y-60,8,60);
      ctx.fillStyle='#4A9A2A';
      for(let a=-60;a<=60;a+=30) {
        ctx.save(); ctx.translate(dx,d.y-60);
        ctx.rotate(a*Math.PI/180);
        ctx.fillRect(-3,-35,6,36); ctx.restore();
      }
    } else {
      ctx.fillRect(dx-5,d.y-50,10,50);
      ctx.fillStyle=def.bgDecor==='volcano'?'#5A2A10':'#3A7A1A';
      ctx.beginPath(); ctx.arc(dx,d.y-60,22,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx-18,d.y-50,14,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx+18,d.y-50,14,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(dx,d.y-78,16,0,Math.PI*2); ctx.fill();
    }
  } else if(d.type==='temple') {
    const ty=d.y-TILE*4;
    ctx.fillStyle=def.platColor;
    ctx.fillRect(dx-30,ty,22,TILE*4); ctx.fillRect(dx-34,ty-12,30,14); ctx.fillRect(dx-30,ty-22,22,12);
    ctx.fillRect(dx+8,ty,22,TILE*4);  ctx.fillRect(dx+4,ty-12,30,14);  ctx.fillRect(dx+8,ty-22,22,12);
    ctx.fillStyle=def.platTopColor;
    ctx.fillRect(dx-28,ty+8,18,6); ctx.fillRect(dx+10,ty+8,18,6);
    ctx.fillStyle='#D4A017';
    ctx.fillRect(dx-26,ty-20,16,4); ctx.fillRect(dx+10,ty-20,16,4);
  } else if(d.type==='rock') {
    ctx.fillStyle='#8B7355';
    ctx.beginPath(); ctx.arc(dx,d.y-15,18,Math.PI,0); ctx.fill();
    ctx.fillStyle='#6B5535';
    ctx.beginPath(); ctx.arc(dx-8,d.y-18,10,Math.PI,0); ctx.fill();
  } else if(d.type==='lotus') {
    const t3=Date.now()*0.003;
    const bob=Math.sin(t3+dx*0.05)*4;
    ctx.fillStyle='#C84B8F';
    for(let a=0;a<5;a++) {
      ctx.save(); ctx.translate(dx,d.y+bob);
      ctx.rotate((a/5)*Math.PI*2);
      ctx.beginPath(); ctx.ellipse(0,-14,6,14,0,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(dx,d.y+bob,7,0,Math.PI*2); ctx.fill();
  }
}

function drawTile(t) {
  const def=STAGE_DEFS[currentStage];
  const dx=t.x-camX;
  if(dx+t.w<0||dx>W) return;
  if(t.type==='ground') {
    ctx.fillStyle=def.groundTopColor;
    ctx.fillRect(dx,t.y,t.w,8);
    ctx.fillStyle=def.groundColor;
    ctx.fillRect(dx,t.y+8,t.w,t.h-8);
    ctx.fillStyle='rgba(0,0,0,0.1)';
    ctx.fillRect(dx,t.y,t.w,2);
  } else {
    ctx.fillStyle=def.platColor;
    ctx.fillRect(dx,t.y,t.w,t.h);
    ctx.fillStyle=def.platTopColor;
    ctx.fillRect(dx,t.y,t.w,6);
    if(t.w>=TILE*2) {
      ctx.fillStyle='#C84B8F';
      ctx.beginPath(); ctx.arc(dx+t.w/2,t.y+t.h/2+3,4,0,Math.PI*2); ctx.fill();
    }
  }
}

function drawHazard() {
  const def=STAGE_DEFS[currentStage];
  const t=Date.now()*0.003;
  let topColor,midColor,botColor;
  if(def.hazardType==='lava'){topColor='#FF8C00';midColor='#FF4500';botColor='#8B0000';}
  else if(def.hazardType==='water'){topColor='#00BFFF';midColor='#1A6B8A';botColor='#003050';}
  else{topColor='#0A0020';midColor='#050010';botColor='#000000';}

  for(let i=0;i<W;i+=8) {
    const h=12+Math.sin(i*0.15+t)*4;
    const grd=ctx.createLinearGradient(i,H-TILE*2-h,i,H);
    grd.addColorStop(0,topColor); grd.addColorStop(0.3,midColor); grd.addColorStop(1,botColor);
    ctx.fillStyle=grd;
    ctx.fillRect(i,H-TILE*2-h+2,8,h+TILE*2);
  }
}

function drawCoin(c) {
  const dx=c.x-camX;
  if(c.collected||dx<-20||dx>W+20) return;
  const bob=Math.sin(c.anim)*3;
  const sx=Math.abs(Math.cos(c.anim*0.5));
  ctx.save(); ctx.translate(dx,c.y+bob); ctx.scale(sx,1);
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF5A0';
  ctx.beginPath(); ctx.arc(-3,-3,4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#AA7700'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawEnemy(e) {
  if(!e.alive) return;
  const def=STAGE_DEFS[currentStage];
  const dx=e.x-camX;
  if(dx<-40||dx>W+40) return;
  ctx.save(); ctx.translate(dx+15,e.y+15); ctx.scale(e.dir,1);

  if(def.id<=2) {
    // Monkey
    ctx.fillStyle='#8B4513';
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#D2956B';
    ctx.beginPath(); ctx.arc(4,2,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF6600';
    ctx.beginPath(); ctx.arc(1,-2,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(2,-2,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#D4A017';
    ctx.fillRect(-14,-15,28,5);
  } else if(def.id===3) {
    // Volcano demon
    ctx.fillStyle='#AA0000';
    ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF4400';
    ctx.beginPath(); ctx.arc(0,-2,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFFF00';
    ctx.beginPath(); ctx.arc(-4,-3,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(-3,-3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-3,2,0,Math.PI*2); ctx.fill();
    // Horns
    ctx.fillStyle='#660000';
    ctx.beginPath(); ctx.moveTo(-10,-12); ctx.lineTo(-6,-22); ctx.lineTo(-2,-12); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,-12); ctx.lineTo(6,-22); ctx.lineTo(10,-12); ctx.fill();
  } else if(def.id===4) {
    // Night wraith
    const wt=Date.now()*0.005;
    ctx.fillStyle='rgba(100,0,200,0.85)';
    ctx.beginPath(); ctx.arc(0,Math.sin(wt)*3,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,150,255,0.9)';
    ctx.beginPath(); ctx.arc(0,Math.sin(wt)*3,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00FFFF';
    ctx.beginPath(); ctx.arc(-4,-2+Math.sin(wt)*3,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2+Math.sin(wt)*3,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000080';
    ctx.beginPath(); ctx.arc(-3,-2+Math.sin(wt)*3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-2+Math.sin(wt)*3,2,0,Math.PI*2); ctx.fill();
  } else {
    // Stage 5 – divine guardian
    const wt=Date.now()*0.006;
    ctx.fillStyle='rgba(180,0,255,0.9)';
    ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,255,0.95)';
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF00FF';
    ctx.beginPath(); ctx.arc(-5,-3,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-3,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFF';
    ctx.beginPath(); ctx.arc(-4,-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-3,2.5,0,Math.PI*2); ctx.fill();
    // Halo
    ctx.strokeStyle=`rgba(255,220,0,${0.5+0.5*Math.sin(wt)})`;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,-18,10,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer() {
  const p=player;
  if(p.dead) return;
  if(p.invincible>0&&Math.floor(p.invincible/5)%2===0) return;
  const dx=p.x-camX;
  ctx.save(); ctx.translate(dx+p.w/2,p.y+p.h/2); ctx.scale(p.facing,1);
  ctx.fillStyle='#E8891A';
  ctx.fillRect(-10,-10,20,22);
  const leg=p.onGround?Math.sin(p.runAnim)*6:0;
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(-8,10,7,14+leg); ctx.fillRect(1,10,7,14-leg);
  const arm=p.onGround?Math.sin(p.runAnim)*8:(p.vy<0?-12:0);
  ctx.fillStyle='#D4884A';
  ctx.fillRect(-16,-8,8,5); ctx.fillRect(8,-8+arm,8,5);
  ctx.fillStyle='#D4884A';
  ctx.beginPath(); ctx.arc(0,-16,11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#D4A017';
  ctx.fillRect(-11,-24,22,7);
  ctx.fillStyle='#E8891A';
  ctx.beginPath(); ctx.moveTo(-4,-24); ctx.lineTo(0,-34); ctx.lineTo(4,-24); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(4,-17,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawGoal() {
  const g=level.goal;
  const dx=g.x-camX;
  if(dx<-40||dx>W+40) return;
  const def=STAGE_DEFS[currentStage];
  const poleH=TILE*8;
  ctx.fillStyle='#C17F24';
  ctx.fillRect(dx+10,g.y,6,poleH);
  const wave=Math.sin(Date.now()*0.006)*4;
  ctx.fillStyle=def.id===5?'#FF00FF':'#C84B8F';
  ctx.beginPath();
  ctx.moveTo(dx+16,g.y+4); ctx.lineTo(dx+48+wave,g.y+14); ctx.lineTo(dx+16,g.y+28);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(dx+30+wave/2,g.y+16,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8B7355';
  ctx.fillRect(dx,g.y+poleH-8,26,8);
  // Stage-end glow for stage 5
  if(def.id===5) {
    ctx.save();
    ctx.globalAlpha=0.3+0.2*Math.sin(Date.now()*0.004);
    ctx.shadowBlur=40; ctx.shadowColor='#FF00FF';
    ctx.strokeStyle='#FF00FF'; ctx.lineWidth=3;
    ctx.strokeRect(dx,g.y,26,poleH);
    ctx.restore();
  }
}

function drawParticles() {
  for(const pt of particles) {
    ctx.save(); ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x-camX,pt.y,pt.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════
function gameLoop() {
  if(state!=='play') return;
  animFrame=requestAnimationFrame(gameLoop);
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawHazard();
  for(const d of level.decor) drawDecor(d);
  for(const t of level.tiles) drawTile(t);
  drawGoal();
  for(const c of level.coinList) drawCoin(c);
  for(const e of level.enemies) drawEnemy(e);
  drawParticles();
  drawPlayer();
  // HUD overlay
  ctx.fillStyle='rgba(20,8,0,0.55)';
  roundRect(ctx,10,10,130,30,8); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 15px Nunito';
  ctx.fillText(`🪙 × ${coins}  +${STAGE_DEFS[currentStage].coinBonus}`,18,30);
  update();
}

// ════════════════════════════════════════
//  OVERLAY UI
// ════════════════════════════════════════
function showStageSelect() {
  state='title';
  if(animFrame) cancelAnimationFrame(animFrame);
  const ov=document.getElementById('overlay');
  const cards=STAGE_DEFS.map((def,i)=>{
    const locked=i+1>unlockedStages;
    return `<div class="stage-card${locked?' locked':''}" ${locked?'':'onclick="selectStage('+i+')"'}>
      <div class="stage-num">${def.emoji}</div>
      <div class="stage-name">Stage ${def.id}<br>${def.name}</div>
      <div class="stage-diff" style="color:${def.diffColor}">${locked?'🔒 잠김':def.diff}</div>
    </div>`;
  }).join('');
  ov.innerHTML=`
    <h1>🌺<br>Bali Quest</h1>
    <p>스테이지를 선택하세요.<br>클리어하면 다음 스테이지가 열립니다!</p>
    <div class="stage-cards">${cards}</div>
    ${unlockedStages>1?'<button id="start-btn" onclick="selectStage(0)" style="margin-top:8px;font-size:13px;padding:8px 28px">처음부터 🌺</button>':''}
  `;
  ov.style.display='flex';
  drawTitleScreen();
}

function selectStage(idx) {
  document.getElementById('overlay').style.display='none';
  if(animFrame) cancelAnimationFrame(animFrame);
  initStage(idx, false);
  state='play';
  requestAnimationFrame(gameLoop);
}

function showStageClear(nextIdx) {
  if(animFrame) cancelAnimationFrame(animFrame);
  const def=STAGE_DEFS[currentStage];
  const isLast=nextIdx>=STAGE_DEFS.length;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>${isLast?'🏆 전설 달성!':'🌺 Stage ${def.id} 클리어!'}</h1>
    <p>${isLast
      ? `모든 스테이지를 완료했습니다!\n최종 점수: ${score}`
      : `${def.name} 완료!\n현재 점수: ${score}\n\n다음: ${STAGE_DEFS[nextIdx].emoji} ${STAGE_DEFS[nextIdx].name}`
    }</p>
    ${!isLast?`<button id="start-btn" onclick="continueToNext(${nextIdx})">다음 스테이지 ➡️</button>`:''}
    <button id="start-btn" style="background:linear-gradient(135deg,#5C2D00,#3D1C02);color:#D4A017;margin-top:${isLast?0:8}px;font-size:13px;padding:8px 28px" onclick="showStageSelect()">스테이지 선택</button>
  `;
  ov.style.display='flex';
}

function continueToNext(nextIdx) {
  document.getElementById('overlay').style.display='none';
  if(animFrame) cancelAnimationFrame(animFrame);
  initStage(nextIdx, true);
  state='play';
  requestAnimationFrame(gameLoop);
}

function showGameOver() {
  if(animFrame) cancelAnimationFrame(animFrame);
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>💀 게임 오버</h1>
    <p>발리의 수호신이 화났어요!\n최종 점수: ${score}</p>
    <button id="start-btn" onclick="selectStage(${currentStage})">다시 도전 🎮</button>
    <button id="start-btn" style="background:linear-gradient(135deg,#5C2D00,#3D1C02);color:#D4A017;margin-top:8px;font-size:13px;padding:8px 28px" onclick="showStageSelect()">스테이지 선택</button>
  `;
  ov.style.display='flex';
}

function drawTitleScreen() {
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#5BA3C9'); g.addColorStop(1,'#B8E4F7');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#4A7C2F';
  drawTriangle(100,H,120,200); drawTriangle(300,H,100,160);
  drawTriangle(500,H,140,220); drawTriangle(700,H,110,180);
  ctx.fillStyle='rgba(255,255,255,0.8)';
  drawCloud(100,80); drawCloud(350,60); drawCloud(620,90);
  ctx.fillStyle='#FFE066';
  ctx.beginPath(); ctx.arc(W-80,70,38,0,Math.PI*2); ctx.fill();
}

// ── Boot ──
drawTitleScreen();
showStageSelect();
</script>
